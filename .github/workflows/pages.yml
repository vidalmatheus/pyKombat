# Publica a pasta web/ (build pygbag do jogo) no GitHub Pages.
# Requer: Settings -> Pages -> Source: "GitHub Actions" (o configure-pages
# abaixo tenta habilitar sozinho na primeira execução).
name: Deploy web build to GitHub Pages

on:
  push:
    branches: [master]
    paths: ['web/**']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web
      - id: deployment
        uses: actions/deploy-pages@v4
